version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pokedex_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ['5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
  mongo:
    image: mongo:7-jammy
    ports: ['27017:27017']
    volumes: [mongo_data:/data/db]
volumes:
  postgres_data:
  mongo_data: